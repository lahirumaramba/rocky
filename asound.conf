# /etc/asound.conf for raspberry pi zero 2w with MAX98357A I2S DAC
# This creates a virtual "mixer" so multiple apps can share the I2S mono amp
pcm.dmixer {
    type dmix
    ipc_key 1024
    ipc_perm 0666
    slave {
        pcm "hw:1,0"    # Point directly to your MAX98357 (Card 1)
        period_time 0
        period_size 1024
        buffer_size 8192
        rate 44100
        channels 2      # I2S usually needs 2 channels even if mono
    }
}

# This adds a software volume control labeled "Master"
pcm.softvol {
    type softvol
    slave.pcm "dmixer"
    control.name "Master"
    control.card 1
}

# Set the software volume control as the default for all apps
pcm.!default {
    type plug
    slave.pcm "softvol"
}

ctl.!default {
    type hw
    card 1
}